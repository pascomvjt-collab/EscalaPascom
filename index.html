<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escala da PASCOM</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-dark: #8a6f2e;
    --bg-deep: #0d0f1a;
    --bg-card: #141728;
    --bg-surface: #1a1f35;
    --bg-hover: #222846;
    --text-primary: #f0ead8;
    --text-muted: #8a8fa8;
    --text-accent: #c9a84c;
    --red: #d4594a;
    --green: #5abfa0;
    --blue: #4a7fc1;
    --purple: #8b6bb0;
    --border: rgba(201,168,76,0.18);
    --shadow: 0 8px 40px rgba(0,0,0,0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background stars effect */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(201,168,76,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(201,168,76,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 80%, rgba(255,255,255,0.1) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 60%, rgba(201,168,76,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 70%, rgba(255,255,255,0.08) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 20px 60px; }

  /* Header */
  header {
    text-align: center;
    padding: 40px 20px 24px;
    position: relative;
  }
  header::after {
    content: '';
    display: block;
    margin: 20px auto 0;
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .header-icon {
    font-size: 2.2rem;
    margin-bottom: 8px;
    display: block;
    filter: drop-shadow(0 0 12px rgba(201,168,76,0.6));
  }
  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    color: var(--gold);
    letter-spacing: 0.12em;
    text-shadow: 0 0 30px rgba(201,168,76,0.4);
    font-weight: 700;
  }
  .subtitle {
    font-size: 0.85rem;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* Upload Zone */
  .upload-zone {
    margin: 28px auto;
    max-width: 520px;
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 32px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: rgba(201,168,76,0.03);
    position: relative;
    overflow: hidden;
  }
  .upload-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.06), transparent 70%);
    pointer-events: none;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--gold);
    background: rgba(201,168,76,0.07);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(201,168,76,0.15);
  }
  .upload-icon { font-size: 2.4rem; margin-bottom: 10px; display: block; }
  .upload-title {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: var(--gold);
    margin-bottom: 6px;
  }
  .upload-sub { font-size: 0.82rem; color: var(--text-muted); }
  .upload-btn {
    display: inline-block;
    margin-top: 14px;
    padding: 9px 24px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: var(--bg-deep);
    border-radius: 30px;
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    border: none;
    transition: all 0.2s ease;
    box-shadow: 0 4px 15px rgba(201,168,76,0.3);
  }
  .upload-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(201,168,76,0.4); }
  #fileInput { display: none; }
  .file-loaded {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    padding: 6px 16px;
    background: rgba(90,191,160,0.12);
    border: 1px solid rgba(90,191,160,0.3);
    border-radius: 20px;
    font-size: 0.8rem;
    color: var(--green);
  }

  /* Calendário */
  .calendar-section {
    margin: 10px 0 32px;
    display: none;
    animation: fadeIn 0.5s ease;
  }
  .calendar-section.visible { display: block; }

  .calendar-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 20px;
  }
  .nav-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--gold);
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-btn:hover { background: var(--bg-hover); border-color: var(--gold); box-shadow: 0 0 12px rgba(201,168,76,0.2); }
  .month-label {
    font-family: 'Cinzel', serif;
    font-size: 1.2rem;
    color: var(--gold);
    letter-spacing: 0.1em;
    min-width: 220px;
    text-align: center;
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    box-shadow: var(--shadow);
  }
  .day-label {
    text-align: center;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    padding: 6px 2px;
    text-transform: uppercase;
  }
  .cal-day {
    aspect-ratio: 1;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: default;
    transition: all 0.2s;
    position: relative;
    min-height: 44px;
    font-size: 0.9rem;
  }
  .cal-day.empty { opacity: 0; pointer-events: none; }
  .cal-day.has-event {
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.25);
    cursor: pointer;
  }
  .cal-day.has-event:hover {
    background: rgba(201,168,76,0.22);
    border-color: var(--gold);
    transform: scale(1.06);
    box-shadow: 0 4px 16px rgba(201,168,76,0.25);
    z-index: 2;
  }
  .cal-day.selected {
    background: linear-gradient(135deg, rgba(201,168,76,0.35), rgba(201,168,76,0.2));
    border: 1.5px solid var(--gold);
    box-shadow: 0 0 16px rgba(201,168,76,0.35);
  }
  .cal-day.today .day-num {
    background: var(--gold);
    color: var(--bg-deep);
    border-radius: 50%;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
  }
  .day-num { font-size: 0.88rem; font-weight: 400; }
  .event-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--gold);
    margin-top: 2px;
    box-shadow: 0 0 4px var(--gold);
  }
  .event-count {
    font-size: 0.6rem;
    color: var(--gold-light);
    margin-top: 1px;
  }

  /* Escala Cards */
  .schedule-section {
    display: none;
    animation: fadeIn 0.4s ease;
  }
  .schedule-section.visible { display: block; }

  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: var(--gold);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  .event-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }
  .event-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
    opacity: 0.7;
  }
  .event-card:hover {
    border-color: rgba(201,168,76,0.4);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 20px rgba(201,168,76,0.08);
  }
  .event-card.highlight {
    border-color: rgba(201,168,76,0.5);
    background: linear-gradient(135deg, var(--bg-card), rgba(201,168,76,0.05));
  }

  .card-date {
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    color: var(--gold);
    letter-spacing: 0.12em;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-title {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 4px;
    line-height: 1.3;
  }
  .card-time {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .card-time::before { content: '⏰'; font-size: 0.7rem; }

  .names-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .name-tag {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    transition: all 0.2s;
    cursor: default;
  }
  .name-tag:hover { transform: scale(1.05); }

  /* Color palette for names */
  .nc-0 { background: rgba(201,168,76,0.15); color: #f0d080; border: 1px solid rgba(201,168,76,0.3); }
  .nc-1 { background: rgba(90,191,160,0.13); color: #7de8c8; border: 1px solid rgba(90,191,160,0.3); }
  .nc-2 { background: rgba(74,127,193,0.13); color: #84b3e8; border: 1px solid rgba(74,127,193,0.3); }
  .nc-3 { background: rgba(212,89,74,0.13); color: #f08878; border: 1px solid rgba(212,89,74,0.3); }
  .nc-4 { background: rgba(139,107,176,0.13); color: #c8a8f0; border: 1px solid rgba(139,107,176,0.3); }
  .nc-5 { background: rgba(220,130,60,0.13); color: #f0a86c; border: 1px solid rgba(220,130,60,0.3); }
  .nc-6 { background: rgba(80,180,100,0.13); color: #80d890; border: 1px solid rgba(80,180,100,0.3); }
  .nc-7 { background: rgba(180,80,130,0.13); color: #e880b8; border: 1px solid rgba(180,80,130,0.3); }
  .nc-8 { background: rgba(60,160,200,0.13); color: #70c8e8; border: 1px solid rgba(60,160,200,0.3); }
  .nc-9 { background: rgba(160,160,60,0.13); color: #d8d870; border: 1px solid rgba(160,160,60,0.3); }

  /* All events list */
  .all-events {
    margin-top: 0;
  }

  /* Search */
  .search-bar {
    margin-bottom: 20px;
    position: relative;
    max-width: 420px;
  }
  .search-bar input {
    width: 100%;
    padding: 10px 16px 10px 40px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 30px;
    color: var(--text-primary);
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input::placeholder { color: var(--text-muted); }
  .search-bar input:focus { border-color: var(--gold); }
  .search-icon {
    position: absolute;
    left: 13px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 1rem;
    pointer-events: none;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .stat-chip {
    padding: 6px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 0.78rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-chip span { color: var(--gold); font-weight: 700; }

  /* Selected day header */
  .day-header {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .day-header-num {
    font-family: 'Cinzel', serif;
    font-size: 2.4rem;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    text-shadow: 0 0 20px rgba(201,168,76,0.4);
  }
  .day-header-info {}
  .day-header-name {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    color: var(--text-primary);
  }
  .day-header-full {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .back-btn {
    margin-left: auto;
    padding: 7px 18px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-muted);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .back-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .big-icon { font-size: 3rem; margin-bottom: 14px; display: block; opacity: 0.5; }
  .empty-state p { font-size: 0.9rem; }

  /* Month tabs */
  .month-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .month-tab {
    padding: 7px 18px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-muted);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Lato', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.06em;
  }
  .month-tab:hover { border-color: var(--gold); color: var(--gold-light); }
  .month-tab.active {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: var(--bg-deep);
    border-color: transparent;
    font-weight: 700;
    box-shadow: 0 2px 12px rgba(201,168,76,0.3);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 600px) {
    .cards-grid { grid-template-columns: 1fr; }
    .calendar-grid { padding: 10px 6px; gap: 2px; }
    .cal-day { min-height: 36px; font-size: 0.8rem; }
    .day-label { font-size: 0.6rem; padding: 4px 1px; }
  }

  .no-data-month {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: 0.88rem;
    background: var(--bg-card);
    border: 1px dashed var(--border);
    border-radius: 14px;
  }
  .no-data-month .icon { font-size: 2rem; display: block; margin-bottom: 10px; opacity: 0.4; }
</style>
</head>
<body>

<div class="container">
  <header>
    <span class="header-icon">✝️</span>
    <h1>ESCALA DA PASCOM</h1>
    <p class="subtitle">Pastoral da Comunicação — Operadores de Câmera</p>
  </header>

  <!-- Upload -->
  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
    <span class="upload-icon">📋</span>
    <div class="upload-title">Carregar Planilha de Escala</div>
    <div class="upload-sub">Arraste o arquivo .csv aqui ou clique para selecionar</div>
    <button class="upload-btn" onclick="event.stopPropagation(); document.getElementById('fileInput').click()">Selecionar Arquivo CSV</button>
    <div id="fileStatus"></div>
    <input type="file" id="fileInput" accept=".csv">
  </div>

  <!-- Calendar + Schedule -->
  <div class="calendar-section" id="calendarSection">
    <!-- Month tabs -->
    <div class="month-tabs" id="monthTabs"></div>

    <!-- Calendar nav -->
    <div class="calendar-nav">
      <button class="nav-btn" id="prevMonth">&#8592;</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="nav-btn" id="nextMonth">&#8594;</button>
    </div>

    <!-- Calendar grid -->
    <div class="calendar-grid" id="calendarGrid"></div>
  </div>

  <!-- Schedule section -->
  <div class="schedule-section" id="scheduleSection">
    <div id="scheduleContent"></div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let allEvents = [];      // { date: Date, day: int, month: int, year: int, title, time, names: [] }
let nameColors = {};     // name → color class index
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth(); // 0-indexed
let selectedDay = null;  // { day, month, year }
let availableMonths = []; // [{year, month}] from data

// ─── Months available in nav ──────────────────────────────────────────────────
const ALL_MONTHS = [
  { year: 2025, month: 5 },  // Junho 2025
  { year: 2025, month: 6 },  { year: 2025, month: 7 },  { year: 2025, month: 8 },
  { year: 2025, month: 9 },  { year: 2025, month: 10 }, { year: 2025, month: 11 },
  { year: 2026, month: 0 },  { year: 2026, month: 1 },  { year: 2026, month: 2 },
  { year: 2026, month: 3 },  { year: 2026, month: 4 },  { year: 2026, month: 5 },
  { year: 2026, month: 6 },  { year: 2026, month: 7 },  { year: 2026, month: 8 },
  { year: 2026, month: 9 },  { year: 2026, month: 10 }, { year: 2026, month: 11 },
];

const PT_MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                   'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const PT_DAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const PT_DAYS_FULL = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira',
                      'Quinta-feira','Sexta-feira','Sábado'];

// ─── CSV Parsing ───────────────────────────────────────────────────────────────
function parseCSV(text) {
  // Parse CSV properly handling quoted fields with newlines
  const rows = [];
  let i = 0;
  while (i < text.length) {
    const row = [];
    while (i < text.length && text[i] !== '\n') {
      if (text[i] === '"') {
        let field = '';
        i++; // skip opening quote
        while (i < text.length) {
          if (text[i] === '"' && text[i+1] === '"') { field += '"'; i += 2; }
          else if (text[i] === '"') { i++; break; }
          else { field += text[i]; i++; }
        }
        row.push(field);
        if (text[i] === ',') i++;
      } else {
        let field = '';
        while (i < text.length && text[i] !== ',' && text[i] !== '\n') { field += text[i]; i++; }
        row.push(field);
        if (text[i] === ',') i++;
      }
    }
    if (text[i] === '\n') i++;
    if (row.length > 0 && row.some(c => c.trim())) rows.push(row);
  }
  return rows;
}

function extractDate(colHeader) {
  // Find [DD/MM/YYYY...] pattern
  const m = colHeader.match(/\[(\d{2})\/(\d{2})\/(\d{4})/);
  if (!m) return null;
  const day = parseInt(m[1]), month = parseInt(m[2]) - 1, year = parseInt(m[3]);
  if (day === 0) return null; // [00/06/2025] = sem data
  return { day, month, year };
}

function extractTime(colHeader) {
  const timePatterns = [
    /Chegada[^\d]*(\d{1,2}:\d{2})hs/i,
    /Chegada[^\d]*(\d{1,2})hs/i,
    /(\d{1,2}:\d{2})hs/i,
    /(\d{1,2})hs/i,
  ];
  for (const p of timePatterns) {
    const m = colHeader.match(p);
    if (m) return m[1].includes(':') ? m[1] : m[1] + ':00';
  }
  return null;
}

function extractTitle(colHeader) {
  // Clean up the column header to extract a readable event title
  let title = colHeader.split('\n')[0].trim();
  // Remove date bracket
  title = title.replace(/\s*\[.*?\]\s*/g, '').trim();
  // Shorten common patterns
  title = title
    .replace(/Escala para as quartas-feiras\.\s*/i, '📷 Quarta-feira')
    .replace(/Escala para as quintas-feiras\.\s*/i, '📷 Quinta-feira')
    .replace(/Escala para as sextas-feiras\.\s*/i, '📷 Sexta-feira')
    .replace(/Escala para os Domingos \(Manhã\)\.\s*/i, '🌅 Domingo (Manhã)')
    .replace(/Escala para os Domingos \(Noite\)\.\s*/i, '🌙 Domingo (Noite)')
    .replace(/Operador\(a\) de Câmeras:.*$/i, '')
    .replace(/Corpus Christi\s*/i, '✝️ Corpus Christi')
    .replace(/Dia "D Missionário".*$/i, '🌍 Dia D Missionário')
    .replace(/CPP\s*/i, '🙏 CPP')
