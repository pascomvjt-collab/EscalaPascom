<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escala da PASCOM Varjota</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-dark: #8a6f2e;
    --bg-deep: #0d0f1a;
    --bg-card: #141728;
    --bg-surface: #1a1f35;
    --bg-hover: #222846;
    --text-primary: #f0ead8;
    --text-muted: #8a8fa8;
    --text-accent: #c9a84c;
    --red: #d4594a;
    --green: #5abfa0;
    --blue: #4a7fc1;
    --purple: #8b6bb0;
    --border: rgba(201,168,76,0.18);
    --shadow: 0 8px 40px rgba(0,0,0,0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background stars effect */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(201,168,76,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(201,168,76,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 80%, rgba(255,255,255,0.1) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 60%, rgba(201,168,76,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 70%, rgba(255,255,255,0.08) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 20px 60px; }

  /* Header */
  header {
    text-align: center;
    padding: 40px 20px 24px;
    position: relative;
  }
  header::after {
    content: '';
    display: block;
    margin: 20px auto 0;
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .header-icon {
    font-size: 2.2rem;
    margin-bottom: 8px;
    display: block;
    filter: drop-shadow(0 0 12px rgba(201,168,76,0.6));
  }
  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    color: var(--gold);
    letter-spacing: 0.12em;
    text-shadow: 0 0 30px rgba(201,168,76,0.4);
    font-weight: 700;
  }
  .subtitle {
    font-size: 0.85rem;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 6px;
  }
  .motto {
    font-family: 'Cinzel', serif;
    font-size: 0.92rem;
    color: var(--gold-light);
    letter-spacing: 0.18em;
    font-style: italic;
    margin-top: 7px;
    text-shadow: 0 0 18px rgba(240,208,128,0.55);
  }

  /* Upload Zone */
  .upload-zone {
    margin: 28px auto;
    max-width: 520px;
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 32px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: rgba(201,168,76,0.03);
    position: relative;
    overflow: hidden;
  }
  .upload-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.06), transparent 70%);
    pointer-events: none;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--gold);
    background: rgba(201,168,76,0.07);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(201,168,76,0.15);
  }
  .upload-icon { font-size: 2.4rem; margin-bottom: 10px; display: block; }
  .upload-title {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: var(--gold);
    margin-bottom: 6px;
  }
  .upload-sub { font-size: 0.82rem; color: var(--text-muted); }
  .upload-btn {
    display: inline-block;
    margin-top: 14px;
    padding: 9px 24px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: var(--bg-deep);
    border-radius: 30px;
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    border: none;
    transition: all 0.2s ease;
    box-shadow: 0 4px 15px rgba(201,168,76,0.3);
  }
  .upload-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(201,168,76,0.4); }
  #fileInput { display: none; }
  .file-loaded {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    padding: 6px 16px;
    background: rgba(90,191,160,0.12);
    border: 1px solid rgba(90,191,160,0.3);
    border-radius: 20px;
    font-size: 0.8rem;
    color: var(--green);
  }

  /* Calendário */
  .calendar-section {
    margin: 10px 0 32px;
    display: none;
    animation: fadeIn 0.5s ease;
  }
  .calendar-section.visible { display: block; }

  .calendar-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 20px;
  }
  .nav-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--gold);
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-btn:hover { background: var(--bg-hover); border-color: var(--gold); box-shadow: 0 0 12px rgba(201,168,76,0.2); }
  .month-label {
    font-family: 'Cinzel', serif;
    font-size: 1.2rem;
    color: var(--gold);
    letter-spacing: 0.1em;
    min-width: 220px;
    text-align: center;
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    box-shadow: var(--shadow);
  }
  .day-label {
    text-align: center;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    padding: 6px 2px;
    text-transform: uppercase;
  }
  .cal-day {
    aspect-ratio: 1;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: default;
    transition: all 0.2s;
    position: relative;
    min-height: 44px;
    font-size: 0.9rem;
  }
  .cal-day.empty { opacity: 0; pointer-events: none; }
  .cal-day.has-event {
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.25);
    cursor: pointer;
  }
  .cal-day.has-event:hover {
    background: rgba(201,168,76,0.22);
    border-color: var(--gold);
    transform: scale(1.06);
    box-shadow: 0 4px 16px rgba(201,168,76,0.25);
    z-index: 2;
  }
  .cal-day.selected {
    background: linear-gradient(135deg, rgba(201,168,76,0.35), rgba(201,168,76,0.2));
    border: 1.5px solid var(--gold);
    box-shadow: 0 0 16px rgba(201,168,76,0.35);
  }
  .cal-day.today .day-num {
    background: var(--gold);
    color: var(--bg-deep);
    border-radius: 50%;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
  }
  .day-num { font-size: 0.88rem; font-weight: 400; }
  .event-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--gold);
    margin-top: 2px;
    box-shadow: 0 0 4px var(--gold);
  }
  .event-count {
    font-size: 0.6rem;
    color: var(--gold-light);
    margin-top: 1px;
  }

  /* Escala Cards */
  .schedule-section {
    display: none;
    animation: fadeIn 0.4s ease;
  }
  .schedule-section.visible { display: block; }

  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: var(--gold);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  .event-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }
  .event-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
    opacity: 0.7;
  }
  .event-card:hover {
    border-color: rgba(201,168,76,0.4);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 20px rgba(201,168,76,0.08);
  }
  .event-card.highlight {
    border-color: rgba(201,168,76,0.5);
    background: linear-gradient(135deg, var(--bg-card), rgba(201,168,76,0.05));
  }

  .card-date {
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    color: var(--gold);
    letter-spacing: 0.12em;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-title {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 4px;
    line-height: 1.3;
  }
  .card-time {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .card-time::before { content: '⏰'; font-size: 0.7rem; }

  .names-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .name-tag {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    transition: all 0.2s;
    cursor: default;
  }
  .name-tag:hover { transform: scale(1.05); }

  /* Color palette for names */
  .nc-0 { background: rgba(201,168,76,0.15); color: #f0d080; border: 1px solid rgba(201,168,76,0.3); }
  .nc-1 { background: rgba(90,191,160,0.13); color: #7de8c8; border: 1px solid rgba(90,191,160,0.3); }
  .nc-2 { background: rgba(74,127,193,0.13); color: #84b3e8; border: 1px solid rgba(74,127,193,0.3); }
  .nc-3 { background: rgba(212,89,74,0.13); color: #f08878; border: 1px solid rgba(212,89,74,0.3); }
  .nc-4 { background: rgba(139,107,176,0.13); color: #c8a8f0; border: 1px solid rgba(139,107,176,0.3); }
  .nc-5 { background: rgba(220,130,60,0.13); color: #f0a86c; border: 1px solid rgba(220,130,60,0.3); }
  .nc-6 { background: rgba(80,180,100,0.13); color: #80d890; border: 1px solid rgba(80,180,100,0.3); }
  .nc-7 { background: rgba(180,80,130,0.13); color: #e880b8; border: 1px solid rgba(180,80,130,0.3); }
  .nc-8 { background: rgba(60,160,200,0.13); color: #70c8e8; border: 1px solid rgba(60,160,200,0.3); }
  .nc-9 { background: rgba(160,160,60,0.13); color: #d8d870; border: 1px solid rgba(160,160,60,0.3); }

  /* All events list */
  .all-events {
    margin-top: 0;
  }

  /* Search */
  .search-bar {
    margin-bottom: 20px;
    position: relative;
    max-width: 420px;
  }
  .search-bar input {
    width: 100%;
    padding: 10px 16px 10px 40px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 30px;
    color: var(--text-primary);
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input::placeholder { color: var(--text-muted); }
  .search-bar input:focus { border-color: var(--gold); }
  .search-icon {
    position: absolute;
    left: 13px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 1rem;
    pointer-events: none;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .stat-chip {
    padding: 6px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 0.78rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-chip span { color: var(--gold); font-weight: 700; }

  /* Selected day header */
  .day-header {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .day-header-num {
    font-family: 'Cinzel', serif;
    font-size: 2.4rem;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    text-shadow: 0 0 20px rgba(201,168,76,0.4);
  }
  .day-header-info {}
  .day-header-name {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    color: var(--text-primary);
  }
  .day-header-full {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .back-btn {
    margin-left: auto;
    padding: 7px 18px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-muted);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .back-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .big-icon { font-size: 3rem; margin-bottom: 14px; display: block; opacity: 0.5; }
  .empty-state p { font-size: 0.9rem; }

  /* PDF Button */
  .pdf-btn {
    padding: 12px 32px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: var(--bg-deep);
    border: none;
    border-radius: 30px;
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 4px 20px rgba(201,168,76,0.35);
  }
  .pdf-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(201,168,76,0.5);
  }
  .pdf-btn:active { transform: scale(0.97); }

  /* Month tabs — hidden, kept for JS compat */
  .month-tabs { display: none; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 600px) {
    .cards-grid { grid-template-columns: 1fr; }
    .calendar-grid { padding: 10px 6px; gap: 2px; }
    .cal-day { min-height: 36px; font-size: 0.8rem; }
    .day-label { font-size: 0.6rem; padding: 4px 1px; }
  }

  .no-data-month {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: 0.88rem;
    background: var(--bg-card);
    border: 1px dashed var(--border);
    border-radius: 14px;
  }
  .no-data-month .icon { font-size: 2rem; display: block; margin-bottom: 10px; opacity: 0.4; }
</style>
</head>
<body>

<div class="container">
  <header>
    <span class="header-icon">📖</span>
    <h1>ESCALA DA PASCOM</h1>
    <p class="subtitle">Pastoral da Comunicação</p>
    <p class="motto">Tudo para maior glória de Deus</p>
  </header>

  <!-- Upload -->
  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
    <span class="upload-icon">📋</span>
    <div class="upload-title">Carregar Planilha de Escala</div>
    <div class="upload-sub">Arraste o arquivo .csv aqui ou clique para selecionar</div>
    <button class="upload-btn" onclick="event.stopPropagation(); document.getElementById('fileInput').click()">Selecionar Arquivo CSV</button>
    <div id="fileStatus"></div>
    <input type="file" id="fileInput" accept=".csv">
  </div>

  <!-- Calendar + Schedule -->
  <div class="calendar-section" id="calendarSection">

    <!-- Calendar nav -->
    <div class="calendar-nav">
      <button class="nav-btn" id="prevMonth">&#8592;</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="nav-btn" id="nextMonth">&#8594;</button>
    </div>

    <!-- Calendar grid -->
    <div class="calendar-grid" id="calendarGrid"></div>
  </div>

  <!-- Schedule section -->
  <div class="schedule-section" id="scheduleSection">
    <div id="scheduleContent"></div>
    <div id="pdfBtnWrap" style="display:none; text-align:center; margin-top:28px;">
      <button class="pdf-btn" id="pdfBtn" onclick="generatePDF()">📄 Gerar PDF desta Escala</button>
    </div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let allEvents = [];      // { date: Date, day: int, month: int, year: int, title, time, names: [] }
let nameColors = {};     // name → color class index
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth(); // 0-indexed
let selectedDay = null;  // { day, month, year }
let availableMonths = []; // [{year, month}] from data

// ─── Months available in nav ──────────────────────────────────────────────────
const ALL_MONTHS = [
  { year: 2025, month: 5 },  // Junho 2025
  { year: 2025, month: 6 },  { year: 2025, month: 7 },  { year: 2025, month: 8 },
  { year: 2025, month: 9 },  { year: 2025, month: 10 }, { year: 2025, month: 11 },
  { year: 2026, month: 0 },  { year: 2026, month: 1 },  { year: 2026, month: 2 },
  { year: 2026, month: 3 },  { year: 2026, month: 4 },  { year: 2026, month: 5 },
  { year: 2026, month: 6 },  { year: 2026, month: 7 },  { year: 2026, month: 8 },
  { year: 2026, month: 9 },  { year: 2026, month: 10 }, { year: 2026, month: 11 },
];

const PT_MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                   'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const PT_DAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const PT_DAYS_FULL = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira',
                      'Quinta-feira','Sexta-feira','Sábado'];

// ─── CSV Parsing ───────────────────────────────────────────────────────────────
function parseCSV(text) {
  // Parse CSV properly handling quoted fields with newlines
  const rows = [];
  let i = 0;
  while (i < text.length) {
    const row = [];
    while (i < text.length && text[i] !== '\n') {
      if (text[i] === '"') {
        let field = '';
        i++; // skip opening quote
        while (i < text.length) {
          if (text[i] === '"' && text[i+1] === '"') { field += '"'; i += 2; }
          else if (text[i] === '"') { i++; break; }
          else { field += text[i]; i++; }
        }
        row.push(field);
        if (text[i] === ',') i++;
      } else {
        let field = '';
        while (i < text.length && text[i] !== ',' && text[i] !== '\n') { field += text[i]; i++; }
        row.push(field);
        if (text[i] === ',') i++;
      }
    }
    if (text[i] === '\n') i++;
    if (row.length > 0 && row.some(c => c.trim())) rows.push(row);
  }
  return rows;
}

function extractDate(colHeader) {
  // Find [DD/MM/YYYY...] pattern
  const m = colHeader.match(/\[(\d{2})\/(\d{2})\/(\d{4})/);
  if (!m) return null;
  const day = parseInt(m[1]), month = parseInt(m[2]) - 1, year = parseInt(m[3]);
  if (day === 0) return null; // [00/06/2025] = sem data
  return { day, month, year };
}

function extractTime(colHeader) {
  const timePatterns = [
    /Chegada[^\d]*(\d{1,2}:\d{2})hs/i,
    /Chegada[^\d]*(\d{1,2})hs/i,
    /(\d{1,2}:\d{2})hs/i,
    /(\d{1,2})hs/i,
  ];
  for (const p of timePatterns) {
    const m = colHeader.match(p);
    if (m) return m[1].includes(':') ? m[1] : m[1] + ':00';
  }
  return null;
}

function extractTitle(colHeader) {
  // Clean up the column header to extract a readable event title
  let title = colHeader.split('\n')[0].trim();
  // Remove date bracket
  title = title.replace(/\s*\[.*?\]\s*/g, '').trim();
  // Shorten common patterns
  title = title
    .replace(/Escala para as quartas-feiras\.\s*/i, '📷 Quarta-feira')
    .replace(/Escala para as quintas-feiras\.\s*/i, '📷 Quinta-feira')
    .replace(/Escala para as sextas-feiras\.\s*/i, '📷 Sexta-feira')
    .replace(/Escala para os Domingos \(Manhã\)\.\s*/i, '🌅 Domingo (Manhã)')
    .replace(/Escala para os Domingos \(Noite\)\.\s*/i, '🌙 Domingo (Noite)')
    .replace(/Operador\(a\) de Câmeras:.*$/i, '')
    .replace(/Corpus Christi\s*/i, '✝️ Corpus Christi')
    .replace(/Dia "D Missionário".*$/i, '🌍 Dia D Missionário')
    .replace(/CPP\s*/i, '🙏 CPP')
    .replace(/Cobertura fotográfica dos Tríduos.*$/i, '📸 Tríduos')
    .trim();
  // Extract event name from bracket if present
  const inBracket = colHeader.match(/\[[\d/]+\s+\(([^)]+)\)\]/);
  if (inBracket) title += ' — ' + inBracket[1];
  return title || 'Evento';
}

function processData(csvText) {
  const rows = parseCSV(csvText);
  if (rows.length < 2) { alert('Arquivo CSV inválido ou vazio.'); return; }

  const headers = rows[0];
  const nameColIdx = headers.findIndex(h => h.trim().toLowerCase() === 'nome' || h.trim() === 'Nome');
  if (nameColIdx < 0) { alert('Coluna "Nome" não encontrada no CSV.'); return; }

  // Build name → color map
  nameColors = {};
  let colorIdx = 0;
  for (let r = 1; r < rows.length; r++) {
    const name = (rows[r][nameColIdx] || '').trim();
    if (name && !nameColors[name]) {
      nameColors[name] = colorIdx % 10;
      colorIdx++;
    }
  }

  allEvents = [];

  for (let c = 0; c < headers.length; c++) {
    if (c === nameColIdx) continue;
    const col = headers[c];
    const dateInfo = extractDate(col);
    if (!dateInfo) continue;

    const names = [];
    for (let r = 1; r < rows.length; r++) {
      const val = (rows[r][c] || '').trim();
      if (val.toLowerCase() === 'disponível') {
        const name = (rows[r][nameColIdx] || '').trim();
        if (name) names.push(name);
      }
    }

    if (names.length === 0) continue;

    allEvents.push({
      ...dateInfo,
      title: extractTitle(col),
      time: extractTime(col),
      names,
      colHeader: col,
    });
  }

  // Sort by date then time
  allEvents.sort((a, b) => {
    const da = new Date(a.year, a.month, a.day);
    const db = new Date(b.year, b.month, b.day);
    return da - db || (a.time || '00:00').localeCompare(b.time || '00:00');
  });

  // Find available months from data
  availableMonths = [];
  const seen = new Set();
  for (const ev of allEvents) {
    const key = `${ev.year}-${ev.month}`;
    if (!seen.has(key)) { seen.add(key); availableMonths.push({ year: ev.year, month: ev.month }); }
  }

  // Set current month to first month with data
  if (availableMonths.length > 0) {
    currentYear = availableMonths[0].year;
    currentMonth = availableMonths[0].month;
  }
  selectedDay = null;

  buildUI();
}

// ─── Build Month Tabs ─────────────────────────────────────────────────────────
function buildMonthTabs() {
  const container = document.getElementById('monthTabs');
  const months = ALL_MONTHS;
  container.innerHTML = '';
  for (const {year, month} of months) {
    const btn = document.createElement('button');
    btn.className = 'month-tab' + (year === currentYear && month === currentMonth ? ' active' : '');
    btn.textContent = PT_MONTHS[month].slice(0,3) + ' ' + year;
    btn.onclick = () => { currentYear = year; currentMonth = month; selectedDay = null; buildUI(); };
    container.appendChild(btn);
  }
}

// ─── Build Calendar ───────────────────────────────────────────────────────────
function buildCalendar() {
  const label = document.getElementById('monthLabel');
  label.textContent = PT_MONTHS[currentMonth] + ' ' + currentYear;

  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';

  // Day labels
  for (const d of PT_DAYS) {
    const el = document.createElement('div');
    el.className = 'day-label';
    el.textContent = d;
    grid.appendChild(el);
  }

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

  // Events indexed by day
  const eventsByDay = {};
  for (const ev of allEvents) {
    if (ev.year === currentYear && ev.month === currentMonth) {
      if (!eventsByDay[ev.day]) eventsByDay[ev.day] = 0;
      eventsByDay[ev.day]++;
    }
  }

  const today = new Date();

  // Empty cells
  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day';
    const isToday = today.getDate() === d && today.getMonth() === currentMonth && today.getFullYear() === currentYear;
    if (isToday) el.classList.add('today');

    const count = eventsByDay[d] || 0;
    if (count > 0) {
      el.classList.add('has-event');
      el.onclick = () => selectDay(d);
    }

    if (selectedDay && selectedDay.day === d && selectedDay.month === currentMonth && selectedDay.year === currentYear) {
      el.classList.add('selected');
    }

    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = d;
    el.appendChild(numEl);

    if (count > 0) {
      const dot = document.createElement('div');
      dot.className = 'event-dot';
      el.appendChild(dot);
      if (count > 1) {
        const cnt = document.createElement('div');
        cnt.className = 'event-count';
        cnt.textContent = count + 'x';
        el.appendChild(cnt);
      }
    }

    grid.appendChild(el);
  }
}

// ─── Select Day ───────────────────────────────────────────────────────────────
function selectDay(day) {
  selectedDay = { day, month: currentMonth, year: currentYear };
  buildUI();
  document.getElementById('scheduleSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ─── Build Schedule Section ───────────────────────────────────────────────────
function buildSchedule() {
  const section = document.getElementById('scheduleSection');
  const content = document.getElementById('scheduleContent');
  section.classList.add('visible');

  if (selectedDay) {
    // Events for selected day
    const dayEvents = allEvents.filter(e => e.day === selectedDay.day && e.month === selectedDay.month && e.year === selectedDay.year);
    const dateObj = new Date(selectedDay.year, selectedDay.month, selectedDay.day);
    const dayOfWeek = PT_DAYS_FULL[dateObj.getDay()];

    content.innerHTML = `
      <div class="day-header">
        <div class="day-header-num">${String(selectedDay.day).padStart(2,'0')}</div>
        <div class="day-header-info">
          <div class="day-header-name">${dayOfWeek}</div>
          <div class="day-header-full">${PT_MONTHS[selectedDay.month]} de ${selectedDay.year} — ${dayEvents.length} evento${dayEvents.length !== 1 ? 's' : ''}</div>
        </div>
        <button class="back-btn" onclick="clearDay()">← Ver mês todo</button>
      </div>
      <div class="cards-grid">${dayEvents.map(renderCard).join('')}</div>
    `;
    document.getElementById('pdfBtnWrap').style.display = 'block';
  } else {
    // All events for current month
    const monthEvents = allEvents.filter(e => e.month === currentMonth && e.year === currentYear);

    if (monthEvents.length === 0) {
      content.innerHTML = `<div class="no-data-month"><span class="icon">🗓️</span>Nenhum evento no CSV para ${PT_MONTHS[currentMonth]} de ${currentYear}.<br>Carregue um CSV com datas neste mês.</div>`;
      return;
    }

    // Group by day
    const byDay = {};
    for (const ev of monthEvents) {
      if (!byDay[ev.day]) byDay[ev.day] = [];
      byDay[ev.day].push(ev);
    }

    // Stats
    const allNames = new Set(monthEvents.flatMap(e => e.names));
    const statsHtml = `
      <div class="stats-bar">
        <div class="stat-chip">📅 <span>${monthEvents.length}</span> eventos</div>
        <div class="stat-chip">👥 <span>${allNames.size}</span> voluntários</div>
        <div class="stat-chip">📆 <span>${Object.keys(byDay).length}</span> dias com escala</div>
      </div>`;

    let html = statsHtml;
    for (const day of Object.keys(byDay).map(Number).sort((a,b)=>a-b)) {
      const dateObj = new Date(currentYear, currentMonth, day);
      const dow = PT_DAYS_FULL[dateObj.getDay()];
      html += `<div class="section-title">📆 ${String(day).padStart(2,'0')} de ${PT_MONTHS[currentMonth]} — ${dow}</div>`;
      html += `<div class="cards-grid all-events">${byDay[day].map(renderCard).join('')}</div>`;
      html += `<div style="height:20px"></div>`;
    }
    content.innerHTML = html;
  }
  // Show PDF button whenever there's content
  document.getElementById('pdfBtnWrap').style.display = 'block';
}

function clearDay() {
  selectedDay = null;
  buildUI();
}

function renderCard(ev) {
  const namesHtml = ev.names.map(n => {
    const nc = nameColors[n] !== undefined ? nameColors[n] : 0;
    return `<span class="name-tag nc-${nc}">${n.trim()}</span>`;
  }).join('');

  const timeHtml = ev.time ? `<div class="card-time">${ev.time}hs</div>` : '';

  return `
    <div class="event-card">
      <div class="card-date">📅 ${String(ev.day).padStart(2,'0')}/${String(ev.month+1).padStart(2,'0')}/${ev.year}</div>
      <div class="card-title">${ev.title}</div>
      ${timeHtml}
      <div class="names-list">${namesHtml}</div>
    </div>`;
}

// ─── Navigation ───────────────────────────────────────────────────────────────
function navMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  selectedDay = null;
  buildUI();
}

document.getElementById('prevMonth').onclick = () => navMonth(-1);
document.getElementById('nextMonth').onclick = () => navMonth(1);

// ─── Build Full UI ────────────────────────────────────────────────────────────
function buildUI() {
  document.getElementById('calendarSection').classList.add('visible');
  buildCalendar();
  buildSchedule();
}

// ─── PDF Generation ───────────────────────────────────────────────────────────
function generatePDF() {
  const btn = document.getElementById('pdfBtn');
  btn.textContent = '⏳ Gerando PDF...';
  btn.disabled = true;

  // Build a clean print-friendly version
  const monthName = PT_MONTHS[currentMonth] + ' ' + currentYear;
  const eventsToRender = selectedDay
    ? allEvents.filter(e => e.day === selectedDay.day && e.month === selectedDay.month && e.year === selectedDay.year)
    : allEvents.filter(e => e.month === currentMonth && e.year === currentYear);

  const nameColorMap = {
    0:'#c9a84c', 1:'#5abfa0', 2:'#4a7fc1', 3:'#d4594a', 4:'#8b6bb0',
    5:'#dc823c', 6:'#50b464', 7:'#b45082', 8:'#3ca0c8', 9:'#a0a03c'
  };

  // Group by day
  const byDay = {};
  for (const ev of eventsToRender) {
    if (!byDay[ev.day]) byDay[ev.day] = [];
    byDay[ev.day].push(ev);
  }

  let cardsHtml = '';
  for (const day of Object.keys(byDay).map(Number).sort((a,b)=>a-b)) {
    const dateObj = new Date(currentYear, currentMonth, day);
    const dow = PT_DAYS_FULL[dateObj.getDay()];
    cardsHtml += `<div class="day-group-title">${String(day).padStart(2,'0')} de ${PT_MONTHS[currentMonth]} — ${dow}</div>`;
    for (const ev of byDay[day]) {
      const namesHtml = ev.names.map(n => {
        const nc = nameColors[n] !== undefined ? nameColors[n] : 0;
        const col = nameColorMap[nc];
        return `<span style="display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;color:${col};border:1px solid ${col}44;background:${col}18;margin:2px 3px;">${n.trim()}</span>`;
      }).join('');
      cardsHtml += `
        <div class="pdf-card">
          <div class="pdf-card-date">📅 ${String(ev.day).padStart(2,'0')}/${String(ev.month+1).padStart(2,'0')}/${ev.year}</div>
          <div class="pdf-card-title">${ev.title}</div>
          ${ev.time ? `<div class="pdf-card-time">⏰ ${ev.time}hs</div>` : ''}
          <div style="margin-top:8px;">${namesHtml}</div>
        </div>`;
    }
  }

  const printHtml = `<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<title>Escala PASCOM — ${monthName}</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lato', sans-serif; background: #0d0f1a; color: #f0ead8; padding: 30px 40px; }
  .pdf-header { text-align: center; border-bottom: 2px solid #c9a84c44; padding-bottom: 20px; margin-bottom: 28px; }
  .pdf-icon { font-size: 2rem; display: block; margin-bottom: 8px; }
  .pdf-title { font-family: 'Cinzel', serif; font-size: 22px; color: #c9a84c; letter-spacing: 0.12em; }
  .pdf-sub { font-size: 11px; color: #8a8fa8; letter-spacing: 0.2em; text-transform: uppercase; margin-top: 4px; }
  .pdf-motto { font-family: 'Cinzel', serif; font-size: 10px; color: #8a6f2e; font-style: italic; margin-top: 3px; }
  .pdf-month { font-family: 'Cinzel', serif; font-size: 13px; color: #f0d080; margin-top: 10px; letter-spacing: 0.1em; }
  .day-group-title { font-family: 'Cinzel', serif; font-size: 12px; color: #c9a84c; letter-spacing: 0.12em; text-transform: uppercase; margin: 20px 0 10px; padding-bottom: 5px; border-bottom: 1px solid #c9a84c30; }
  .pdf-card { background: #141728; border: 1px solid #c9a84c28; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; break-inside: avoid; position: relative; overflow: hidden; }
  .pdf-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #8a6f2e, #f0d080); }
  .pdf-card-date { font-size: 10px; color: #c9a84c; font-family: 'Cinzel', serif; margin-bottom: 3px; }
  .pdf-card-title { font-size: 13px; font-weight: 700; color: #f0ead8; margin-bottom: 2px; }
  .pdf-card-time { font-size: 11px; color: #8a8fa8; margin-bottom: 4px; }
  .pdf-footer { text-align: center; margin-top: 36px; font-size: 10px; color: #8a8fa8; letter-spacing: 0.1em; border-top: 1px solid #c9a84c22; padding-top: 14px; }
  @media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
</style></head>
<body>
<div class="pdf-header">
  <span class="pdf-icon">📖</span>
  <div class="pdf-title">ESCALA DA PASCOM</div>
  <div class="pdf-sub">Pastoral da Comunicação</div>
  <div class="pdf-motto">Tudo para maior glória de Deus</div>
  <div class="pdf-month">${selectedDay ? `${String(selectedDay.day).padStart(2,'0')} de ${PT_MONTHS[selectedDay.month]} de ${selectedDay.year}` : monthName}</div>
</div>
${cardsHtml}
<div class="pdf-footer">Gerado em ${new Date().toLocaleDateString('pt-BR')} às ${new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})}</div>
</body></html>`;

  const blob = new Blob([printHtml], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const win = window.open(url, '_blank');
  if (win) {
    win.onload = () => {
      setTimeout(() => {
        win.print();
        URL.revokeObjectURL(url);
      }, 800);
    };
  }

  setTimeout(() => {
    btn.textContent = '📄 Gerar PDF desta Escala';
    btn.disabled = false;
  }, 1500);
}

// ─── File Upload ─────────────────────────────────────────────────────────────
function handleFile(file) {
  if (!file || !file.name.endsWith('.csv')) { alert('Por favor, selecione um arquivo .csv'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('fileStatus').innerHTML =
      `<div class="file-loaded">✅ ${file.name} carregado com sucesso</div>`;
    processData(e.target.result);
  };
  reader.readAsText(file, 'UTF-8');
}

document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
</script>
</body>
